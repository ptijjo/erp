services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
      
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_vifaa
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}  # Ton login pour pgadmin
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}         # Ton mot de passe pour pgadmin
    ports:
      - "5050:80"                             # Tu y accéderas sur http://localhost:8080
    depends_on:
      - db                                    # "db" doit être le nom de ton service postgres     
    # TRÈS IMPORTANT : Déclarer le volume nommé ici
volumes:
  db_data: